<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Smart Scheduler</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5f9;
      color: #222;
    }

    .app {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 24px;
      min-height: 100vh;
      padding: 24px;
    }

    .panel {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }

    .left-panel {
      position: sticky;
      top: 24px;
      align-self: start;
      max-height: calc(100vh - 48px);
      overflow: auto;
    }

    h1 {
      margin: 0 0 18px 0;
      font-size: 28px;
    }

    h2 {
      margin: 22px 0 10px 0;
      font-size: 18px;
    }

    h3 {
      margin: 14px 0 8px 0;
      font-size: 15px;
    }

    .muted {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 11px 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #d8dce5;
      font-size: 14px;
      background: white;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .secondary-btn {
      background: #4CAF50;
      color: white;
    }

    .primary-btn {
      background: #2f80ed;
      color: white;
    }

    .ghost-btn {
      background: #eef3fb;
      color: #2f80ed;
    }

    .danger-btn {
      width: auto;
      margin: 0;
      padding: 6px 10px;
      font-size: 12px;
      background: #e74c3c;
      color: white;
    }

    .calendar-btn {
      background: #eef3fb;
      color: #2f80ed;
      padding: 8px 10px;
      margin: 0;
    }

    .today-btn {
      background: #2f80ed;
      color: white;
      padding: 10px 12px;
      margin: 8px 0 0 0;
    }

    .voice-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .voice-mic-btn {
      width: 42px;
      height: 42px;
      min-width: 42px;
      padding: 0;
      border-radius: 50%;
      background: #eef3fb;
      color: #2f80ed;
      border: 1px solid #d7e5fb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin: 0;
    }

    .voice-mic-btn.recording {
      background: #ffe7e7;
      color: #d93025;
      border-color: #ffb8b3;
    }

    .voice-status {
      flex: 1;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      min-height: 18px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .checkbox-row input {
      width: auto;
      margin: 0;
    }

    .hidden {
      display: none;
    }

    .settings-box {
      border: 1px solid #e7ebf3;
      background: #fafcff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .settings-note {
      font-size: 12px;
      color: #666;
      margin-top: -2px;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .task-list {
      margin-top: 8px;
    }

    .task-item {
      border: 1px solid #edf0f5;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafbfd;
    }

    .task-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .task-text {
      flex: 1;
      line-height: 1.5;
      font-size: 14px;
    }

    .schedule-box {
      border: 1px solid #dde7d8;
      background: #fbfffb;
      border-radius: 14px;
      overflow: hidden;
      min-height: 300px;
    }

    .schedule-head {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      padding: 14px 18px;
      background: #f0f7ef;
      font-weight: bold;
      border-bottom: 1px solid #dde7d8;
    }

    .schedule-item {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid #eef4ed;
      align-items: start;
    }

    .schedule-item:last-child {
      border-bottom: none;
    }

    .schedule-time {
      font-weight: bold;
      font-size: 15px;
    }

    .schedule-content {
      line-height: 1.6;
      font-size: 15px;
    }

    .empty-box {
      padding: 24px 18px;
      color: #777;
      line-height: 1.6;
    }

    .calendar-box {
      border: 1px solid #e7ebf3;
      background: #fafcff;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
      margin-bottom: 18px;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: 90px 1fr 90px;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .calendar-title {
      text-align: center;
      font-weight: bold;
      font-size: 17px;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .calendar-weekday {
      text-align: center;
      font-size: 12px;
      color: #666;
      padding: 4px 0;
    }

    .calendar-day {
      min-height: 58px;
      border: 1px solid #dfe6f2;
      border-radius: 12px;
      background: white;
      padding: 6px 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      transition: 0.15s ease;
    }

    .calendar-day:hover {
      border-color: #2f80ed;
      transform: translateY(-1px);
    }

    .calendar-day.other-month {
      opacity: 0.35;
    }

    .calendar-day.selected {
      background: #2f80ed;
      color: white;
      border-color: #2f80ed;
    }

    .calendar-day.today {
      box-shadow: inset 0 0 0 2px #7bb3ff;
    }

    .calendar-day-num {
      font-size: 14px;
      font-weight: bold;
    }

    .calendar-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4CAF50;
    }

    .calendar-day.selected .calendar-dot {
      background: white;
    }

    .selected-date-box {
      border: 1px solid #e7ebf3;
      background: #fafcff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .selected-date-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    .selected-date-value {
      font-size: 16px;
      font-weight: bold;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .left-panel {
        position: static;
        max-height: none;
      }

      .row-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel left-panel">
      <h1>Smart Scheduler</h1>
      <div class="muted">左で予定を入れて、右にその日の時間割を出す。</div>

      <div class="calendar-box">
        <div class="calendar-header">
          <button class="calendar-btn" onclick="changeMonth(-1)">前月</button>
          <div id="calendarTitle" class="calendar-title"></div>
          <button class="calendar-btn" onclick="changeMonth(1)">次月</button>
        </div>

        <button class="today-btn" onclick="goToToday()">今日に戻る</button>

        <div class="calendar-weekdays">
          <div class="calendar-weekday">日</div>
          <div class="calendar-weekday">月</div>
          <div class="calendar-weekday">火</div>
          <div class="calendar-weekday">水</div>
          <div class="calendar-weekday">木</div>
          <div class="calendar-weekday">金</div>
          <div class="calendar-weekday">土</div>
        </div>

        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <div class="selected-date-box">
        <div class="selected-date-label">選択中の日付</div>
        <div id="selectedDateText" class="selected-date-value"></div>
      </div>

      <div class="voice-toolbar">
        <button id="voiceMicBtn" class="voice-mic-btn" onclick="toggleVoiceInput()">🎤</button>
        <div id="voiceStatus" class="voice-status">録音開始→録音停止で送信します。</div>
      </div>

      <h2>その日の設定</h2>
      <div class="row-2">
        <div>
          <label for="wakeTime">起きる時間</label>
          <select id="wakeTime"></select>
        </div>
        <div>
          <label for="sleepTime">寝る時間</label>
          <select id="sleepTime"></select>
        </div>
      </div>

      <input id="dailyGoal" placeholder="今日の目標 例: 英語を3時間進める">
      <textarea id="globalMemo" placeholder="今日のメモ 例: 午前は集中しやすい / 15時以降は外出可"></textarea>

      <button class="ghost-btn" onclick="toggleSettings()">ルーティン・長期目標の設定を開く</button>

      <div id="settingsPanel" class="settings-box hidden">
        <h3>長期目標</h3>
        <textarea id="longTermGoal" placeholder="例: 3か月で英会話に慣れる / 6月までにポートフォリオ完成"></textarea>

        <h3>毎日のルーティン</h3>
        <textarea id="routineText" placeholder="例:
07:30 | 朝食
12:30 | 昼食
19:00 | 夕食
23:30 | 就寝準備"></textarea>

        <div class="settings-note">ここに入れた内容は毎回AIに渡す。必要ならあとで変えられる。</div>
      </div>

      <h2>予定を追加</h2>
      <input id="task" placeholder="やること 例: 英語勉強">
      <div class="row-3">
        <input id="duration" type="number" placeholder="時間(分)">
        <input id="place" placeholder="場所">
        <input id="taskMemo" placeholder="メモ">
      </div>

      <div class="checkbox-row">
        <input id="isFixed" type="checkbox" onchange="toggleFixedTime()">
        <label for="isFixed">決まった時間で固定する</label>
      </div>

      <div id="fixedTimeWrap" class="hidden">
        <input id="fixedStart" type="time">
      </div>

      <button class="secondary-btn" onclick="addTask()">追加</button>
      <button class="primary-btn" onclick="generateAI()">時間割を作る</button>

      <h2>入力した予定</h2>
      <div id="taskList" class="task-list"></div>
    </div>

    <div class="panel">
      <h1 id="scheduleTitle" style="margin-bottom:6px;">スケジュール</h1>
      <div class="muted" style="margin-bottom:18px;">左に時間、右にやることを表示する。</div>

      <div id="scheduleView" class="schedule-box">
        <div class="schedule-head">
          <div>時間</div>
          <div>内容</div>
        </div>
        <div class="empty-box">まだスケジュールはありません。左で予定を入れて「時間割を作る」を押してください。</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "smartSchedulerCalendarV1";
    let tasks = [];
    let currentMonth = null;

    let mediaRecorder = null;
    let mediaStream = null;
    let audioChunks = [];
    let isRecording = false;
    let isUploadingVoice = false;

    function getTodayString() {
      const today = new Date();
      return formatDateKey(today);
    }

    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatDateJP(dateStr) {
      const [y, m, d] = dateStr.split("-");
      return `${y}年${Number(m)}月${Number(d)}日`;
    }

    function formatMonthJP(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function getDefaultDateData() {
      return {
        wakeTime: "07:00",
        sleepTime: "23:30",
        dailyGoal: "",
        globalMemo: "",
        longTermGoal: "",
        routineText: "",
        tasks: [],
        scheduleItems: []
      };
    }

    function loadAppData() {
      const raw = localStorage.getItem(STORAGE_KEY);

      if (!raw) {
        const initial = {
          selectedDate: getTodayString(),
          dates: {}
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
        return initial;
      }

      try {
        const parsed = JSON.parse(raw);
        if (!parsed.selectedDate) parsed.selectedDate = getTodayString();
        if (!parsed.dates) parsed.dates = {};
        return parsed;
      } catch (e) {
        const reset = {
          selectedDate: getTodayString(),
          dates: {}
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(reset));
        return reset;
      }
    }

    function saveAppData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function getCurrentDateData() {
      const appData = loadAppData();
      const selectedDate = appData.selectedDate;

      if (!appData.dates[selectedDate]) {
        appData.dates[selectedDate] = getDefaultDateData();
        saveAppData(appData);
      }

      return {
        appData,
        selectedDate,
        dateData: appData.dates[selectedDate]
      };
    }

    function hasContent(dateData) {
      if (!dateData) return false;
      return Boolean(
        (dateData.dailyGoal && dateData.dailyGoal.trim()) ||
        (dateData.globalMemo && dateData.globalMemo.trim()) ||
        (dateData.longTermGoal && dateData.longTermGoal.trim()) ||
        (dateData.routineText && dateData.routineText.trim()) ||
        (Array.isArray(dateData.tasks) && dateData.tasks.length) ||
        (Array.isArray(dateData.scheduleItems) && dateData.scheduleItems.length)
      );
    }

    function buildTimeOptions() {
      const selects = [document.getElementById("wakeTime"), document.getElementById("sleepTime")];
      selects.forEach(select => {
        select.innerHTML = "";
        for (let h = 0; h < 24; h++) {
          for (let m = 0; m < 60; m += 30) {
            const hh = String(h).padStart(2, "0");
            const mm = String(m).padStart(2, "0");
            const value = `${hh}:${mm}`;
            const option = document.createElement("option");
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
          }
        }
      });
    }

    function setVoiceStatus(text) {
      document.getElementById("voiceStatus").textContent = text;
    }

    function setVoiceButtonRecording(recording) {
      const btn = document.getElementById("voiceMicBtn");
      if (recording) btn.classList.add("recording");
      else btn.classList.remove("recording");
    }

    function stopMediaTracks() {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
      }
      mediaStream = null;
    }

    function resetVoiceState() {
      mediaRecorder = null;
      audioChunks = [];
      isRecording = false;
      isUploadingVoice = false;
      setVoiceButtonRecording(false);
      stopMediaTracks();
    }

    function mergeParsedData(parsed) {
      if (!parsed) return;

      if (parsed.wakeTime) document.getElementById("wakeTime").value = parsed.wakeTime;
      if (parsed.sleepTime) document.getElementById("sleepTime").value = parsed.sleepTime;
      if (parsed.dailyGoal) document.getElementById("dailyGoal").value = parsed.dailyGoal;
      if (parsed.globalMemo) document.getElementById("globalMemo").value = parsed.globalMemo;
      if (parsed.longTermGoal) document.getElementById("longTermGoal").value = parsed.longTermGoal;
      if (parsed.routineText) document.getElementById("routineText").value = parsed.routineText;

      if (Array.isArray(parsed.tasks) && parsed.tasks.length > 0) {
        parsed.tasks.forEach((task) => {
          if (!task || !task.task) return;

          tasks.push({
            task: task.task || "",
            duration: Number(task.duration) || 0,
            place: task.place || "",
            taskMemo: task.taskMemo || "",
            isFixed: !!task.isFixed,
            fixedStart: task.fixedStart || ""
          });
        });

        renderTaskList();
      }

      saveCurrentDateData();
    }

    function getPreferredMimeType() {
      if (!window.MediaRecorder) return "";

      const candidates = [
        "audio/webm;codecs=opus",
        "audio/webm",
        "audio/mp4",
        "audio/ogg;codecs=opus",
        "audio/ogg"
      ];

      for (const type of candidates) {
        if (MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      }

      return "";
    }

    function getFileNameFromMimeType(mimeType) {
      if (!mimeType) return "recording.webm";
      if (mimeType.includes("mp4")) return "recording.mp4";
      if (mimeType.includes("ogg")) return "recording.ogg";
      if (mimeType.includes("wav")) return "recording.wav";
      return "recording.webm";
    }

    async function uploadVoiceBlob(audioBlob, fileName) {
      const selectedDate = loadAppData().selectedDate;
      const formData = new FormData();
      formData.append("audio", audioBlob, fileName);
      formData.append("selectedDate", selectedDate);

      const response = await fetch("/voice", {
        method: "POST",
        body: formData
      });

      const rawText = await response.text();

      let data;
      try {
        data = JSON.parse(rawText);
      } catch {
        throw new Error(`JSONではなく次が返りました: ${rawText.slice(0, 120)}`);
      }

      if (!response.ok) {
        throw new Error(data.error || "voice upload failed");
      }

      mergeParsedData(data.parsed);
    }

    async function toggleVoiceInput() {
      if (isUploadingVoice) return;

      if (!isRecording) {
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunks = [];

          const preferredMimeType = getPreferredMimeType();
          const options = preferredMimeType ? { mimeType: preferredMimeType } : {};

          mediaRecorder = new MediaRecorder(mediaStream, options);

          mediaRecorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              audioChunks.push(event.data);
            }
          };

          mediaRecorder.onstop = async () => {
            try {
              const actualMimeType = mediaRecorder.mimeType || preferredMimeType || "audio/webm";
              const fileName = getFileNameFromMimeType(actualMimeType);
              const audioBlob = new Blob(audioChunks, { type: actualMimeType });

              if (!audioBlob.size) {
                setVoiceStatus("録音データが取得できませんでした。");
                resetVoiceState();
                return;
              }

              isUploadingVoice = true;
              setVoiceStatus("解析中...");
              audioChunks = [];

              await uploadVoiceBlob(audioBlob, fileName);
              setVoiceStatus("反映しました。必要なら内容を微調整してください。");
            } catch (error) {
              setVoiceStatus(`音声解析エラー: ${error.message}`);
            } finally {
              resetVoiceState();
            }
          };

          mediaRecorder.start();
          isRecording = true;
          setVoiceButtonRecording(true);
          setVoiceStatus("録音中... もう一度押すと終了します。");
        } catch (error) {
          setVoiceStatus("マイクを使えませんでした。ブラウザの許可設定を確認してください。");
          resetVoiceState();
        }

        return;
      }

      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        setVoiceStatus("録音終了。送信しています...");
        mediaRecorder.stop();
      }
    }

    function saveCurrentDateData() {
      const { appData, selectedDate } = getCurrentDateData();

      appData.dates[selectedDate] = {
        ...appData.dates[selectedDate],
        wakeTime: document.getElementById("wakeTime").value,
        sleepTime: document.getElementById("sleepTime").value,
        dailyGoal: document.getElementById("dailyGoal").value.trim(),
        globalMemo: document.getElementById("globalMemo").value.trim(),
        longTermGoal: document.getElementById("longTermGoal").value.trim(),
        routineText: document.getElementById("routineText").value.trim(),
        tasks: tasks
      };

      saveAppData(appData);
      renderCalendar();
    }

    function loadCurrentDateIntoForm() {
      const { selectedDate, dateData } = getCurrentDateData();

      document.getElementById("selectedDateText").textContent = formatDateJP(selectedDate);
      document.getElementById("wakeTime").value = dateData.wakeTime || "07:00";
      document.getElementById("sleepTime").value = dateData.sleepTime || "23:30";
      document.getElementById("dailyGoal").value = dateData.dailyGoal || "";
      document.getElementById("globalMemo").value = dateData.globalMemo || "";
      document.getElementById("longTermGoal").value = dateData.longTermGoal || "";
      document.getElementById("routineText").value = dateData.routineText || "";
      tasks = Array.isArray(dateData.tasks) ? dateData.tasks : [];

      document.getElementById("task").value = "";
      document.getElementById("duration").value = "";
      document.getElementById("place").value = "";
      document.getElementById("taskMemo").value = "";
      document.getElementById("isFixed").checked = false;
      document.getElementById("fixedStart").value = "";
      toggleFixedTime();

      renderTaskList();
      renderSchedule(dateData.scheduleItems || []);
      updateScheduleTitle(selectedDate);
      renderCalendar();
    }

    function updateScheduleTitle(dateStr) {
      document.getElementById("scheduleTitle").textContent = `${formatDateJP(dateStr)} のスケジュール`;
    }

    function toggleSettings() {
      document.getElementById("settingsPanel").classList.toggle("hidden");
    }

    function toggleFixedTime() {
      const checked = document.getElementById("isFixed").checked;
      document.getElementById("fixedTimeWrap").classList.toggle("hidden", !checked);
    }

    function addTask() {
      const task = document.getElementById("task").value.trim();
      const duration = parseInt(document.getElementById("duration").value, 10);
      const place = document.getElementById("place").value.trim();
      const taskMemo = document.getElementById("taskMemo").value.trim();
      const isFixed = document.getElementById("isFixed").checked;
      const fixedStart = document.getElementById("fixedStart").value;

      if (!task || !duration) {
        alert("やることと時間を入れてね");
        return;
      }

      if (isFixed && !fixedStart) {
        alert("固定するなら時間を入れてね");
        return;
      }

      tasks.push({
        task,
        duration,
        place,
        taskMemo,
        isFixed,
        fixedStart
      });

      saveCurrentDateData();
      renderTaskList();

      document.getElementById("task").value = "";
      document.getElementById("duration").value = "";
      document.getElementById("place").value = "";
      document.getElementById("taskMemo").value = "";
      document.getElementById("isFixed").checked = false;
      document.getElementById("fixedStart").value = "";
      toggleFixedTime();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveCurrentDateData();
      renderTaskList();
    }

    function renderTaskList() {
      const box = document.getElementById("taskList");
      box.innerHTML = "";

      if (tasks.length === 0) {
        box.innerHTML = '<div class="muted">まだ予定がありません。</div>';
        return;
      }

      tasks.forEach((t, index) => {
        const item = document.createElement("div");
        item.className = "task-item";

        const row = document.createElement("div");
        row.className = "task-row";

        const text = document.createElement("div");
        text.className = "task-text";

        const parts = [`${t.task}`, `${t.duration}分`];
        if (t.place) parts.push(`場所: ${t.place}`);
        if (t.taskMemo) parts.push(`メモ: ${t.taskMemo}`);
        if (t.isFixed) parts.push(`固定: ${t.fixedStart}`);

        text.textContent = parts.join(" / ");

        const btn = document.createElement("button");
        btn.className = "danger-btn";
        btn.textContent = "削除";
        btn.onclick = () => deleteTask(index);

        row.appendChild(text);
        row.appendChild(btn);
        item.appendChild(row);
        box.appendChild(item);
      });
    }

    function parseSchedule(text) {
      const lines = text.split("\n");
      const items = [];

      for (const line of lines) {
        const trimmed = line.trim();
        const match = trimmed.match(/^(\d{1,2}:\d{2})\s*\|\s*(.+)$/);
        if (match) {
          items.push({
            time: match[1],
            content: match[2]
          });
        }
      }

      return items;
    }

    function saveScheduleItems(items) {
      const { appData, selectedDate } = getCurrentDateData();
      appData.dates[selectedDate] = {
        ...appData.dates[selectedDate],
        wakeTime: document.getElementById("wakeTime").value,
        sleepTime: document.getElementById("sleepTime").value,
        dailyGoal: document.getElementById("dailyGoal").value.trim(),
        globalMemo: document.getElementById("globalMemo").value.trim(),
        longTermGoal: document.getElementById("longTermGoal").value.trim(),
        routineText: document.getElementById("routineText").value.trim(),
        tasks: tasks,
        scheduleItems: items
      };
      saveAppData(appData);
      renderCalendar();
    }

    function renderSchedule(items) {
      const view = document.getElementById("scheduleView");

      if (!items.length) {
        view.innerHTML = `
          <div class="schedule-head">
            <div>時間</div>
            <div>内容</div>
          </div>
          <div class="empty-box">まだスケジュールはありません。左で予定を入れて「時間割を作る」を押してください。</div>
        `;
        return;
      }

      let html = `
        <div class="schedule-head">
          <div>時間</div>
          <div>内容</div>
        </div>
      `;

      items.forEach(item => {
        html += `
          <div class="schedule-item">
            <div class="schedule-time">${item.time}</div>
            <div class="schedule-content">${item.content}</div>
          </div>
        `;
      });

      view.innerHTML = html;
    }

    async function generateAI() {
      saveCurrentDateData();

      document.getElementById("scheduleView").innerHTML = `
        <div class="schedule-head">
          <div>時間</div>
          <div>内容</div>
        </div>
        <div class="empty-box">AIが時間割を作っています...</div>
      `;

      try {
        const response = await fetch("/ai", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            wakeTime: document.getElementById("wakeTime").value,
            sleepTime: document.getElementById("sleepTime").value,
            dailyGoal: document.getElementById("dailyGoal").value.trim(),
            globalMemo: document.getElementById("globalMemo").value.trim(),
            longTermGoal: document.getElementById("longTermGoal").value.trim(),
            routineText: document.getElementById("routineText").value.trim(),
            tasks: tasks
          })
        });

        const data = await response.json();
        const items = parseSchedule(data.result || "");
        renderSchedule(items);
        saveScheduleItems(items);
      } catch (error) {
        document.getElementById("scheduleView").innerHTML = `
          <div class="schedule-head">
            <div>時間</div>
            <div>内容</div>
          </div>
          <div class="empty-box">接続エラー: ${error.message}</div>
        `;
      }
    }

    function selectDate(dateStr) {
      saveCurrentDateData();
      const appData = loadAppData();
      appData.selectedDate = dateStr;
      saveAppData(appData);
      loadCurrentDateIntoForm();
    }

    function changeMonth(diff) {
      currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + diff, 1);
      renderCalendar();
    }

    function goToToday() {
      const today = new Date();
      currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      selectDate(formatDateKey(today));
    }

    function renderCalendar() {
      const appData = loadAppData();
      const selectedDate = appData.selectedDate;
      const selected = new Date(selectedDate + "T00:00:00");

      if (!currentMonth) {
        currentMonth = new Date(selected.getFullYear(), selected.getMonth(), 1);
      }

      document.getElementById("calendarTitle").textContent = formatMonthJP(currentMonth);

      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();

      const firstDay = new Date(year, month, 1);
      const startDay = firstDay.getDay();
      const startDate = new Date(year, month, 1 - startDay);

      const todayKey = getTodayString();

      for (let i = 0; i < 42; i++) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + i);

        const dateKey = formatDateKey(date);
        const dayData = appData.dates[dateKey];
        const isOtherMonth = date.getMonth() !== month;
        const isSelected = dateKey === selectedDate;
        const isToday = dateKey === todayKey;

        const cell = document.createElement("button");
        cell.className = "calendar-day";
        if (isOtherMonth) cell.classList.add("other-month");
        if (isSelected) cell.classList.add("selected");
        if (isToday) cell.classList.add("today");
        cell.onclick = () => selectDate(dateKey);

        const num = document.createElement("div");
        num.className = "calendar-day-num";
        num.textContent = date.getDate();

        cell.appendChild(num);

        if (hasContent(dayData)) {
          const dot = document.createElement("div");
          dot.className = "calendar-dot";
          cell.appendChild(dot);
        }

        grid.appendChild(cell);
      }
    }

    buildTimeOptions();

    const appData = loadAppData();
    const selected = new Date(appData.selectedDate + "T00:00:00");
    currentMonth = new Date(selected.getFullYear(), selected.getMonth(), 1);

    loadCurrentDateIntoForm();

    document.getElementById("wakeTime").addEventListener("change", saveCurrentDateData);
    document.getElementById("sleepTime").addEventListener("change", saveCurrentDateData);
    document.getElementById("dailyGoal").addEventListener("input", saveCurrentDateData);
    document.getElementById("globalMemo").addEventListener("input", saveCurrentDateData);
    document.getElementById("longTermGoal").addEventListener("input", saveCurrentDateData);
    document.getElementById("routineText").addEventListener("input", saveCurrentDateData);
  </script>
</body>
</html>
